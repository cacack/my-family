name: Nightly

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/domain
            fuzz: FuzzParseGenDate
            time: 2m
          - package: ./internal/gedcom
            fuzz: FuzzImport
            time: 2m
          - package: ./internal/media
            fuzz: FuzzGenerateThumbnail
            time: 2m

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'
        cache: true

    - name: Create placeholder for embedded files
      run: |
        mkdir -p internal/web/dist
        echo "placeholder" > internal/web/dist/.gitkeep

    - name: Run ${{ matrix.fuzz }}
      run: go test ${{ matrix.package }} -fuzz=${{ matrix.fuzz }} -fuzztime=${{ matrix.time }}

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-corpus-${{ matrix.fuzz }}
        path: '**/testdata/fuzz/**'
        retention-days: 30

  security:
    name: Security Scan (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Create placeholder for embedded files
      run: |
        mkdir -p internal/web/dist
        echo "placeholder" > internal/web/dist/.gitkeep

    - name: Install frontend dependencies
      run: cd web && npm ci

    - name: Run govulncheck
      uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
      with:
        go-version-file: go.mod
        repo-checkout: false
        output-format: sarif
        output-file: govulncheck-results.sarif

    - name: Upload govulncheck results
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
      if: success() || failure()
      with:
        sarif_file: govulncheck-results.sarif
        category: govulncheck-nightly

    - name: Run gosec
      uses: securego/gosec@c864f68365f29c18b09b66880c76bf74af403aba # master (docker: 2.25.0)
      with:
        args: '-no-fail -exclude=G104 -exclude-generated -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
      if: success() || failure()
      with:
        sarif_file: gosec-results.sarif
        category: gosec-nightly

    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
      continue-on-error: true # Findings go to SARIF/Security tab; don't fail the job
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
      if: (success() || failure()) && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: trivy-results.sarif
        category: trivy-nightly

    - name: npm audit
      run: cd web && npm audit --audit-level=moderate

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [fuzz, security]
    if: failure() && github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Create issue on failure
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Check if an open nightly failure issue already exists
        EXISTING=$(gh issue list --label "nightly-failure" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING" ]; then
          gh issue comment "$EXISTING" --body "Nightly workflow failed again on $(date -u +%Y-%m-%d).

        [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          echo "Commented on existing issue #$EXISTING"
          exit 0
        fi

        gh issue create \
          --title "Nightly workflow failure ($(date -u +%Y-%m-%d))" \
          --label "nightly-failure" \
          --body "The nightly workflow failed on $(date -u +%Y-%m-%d).

        **Fuzz testing**: ${{ needs.fuzz.result }}
        **Security scan**: ${{ needs.security.result }}

        [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

        ---
        This issue was created automatically. Close it once the failure is resolved."
