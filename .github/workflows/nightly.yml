name: Nightly

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/domain
            fuzz: FuzzParseGenDate
            time: 2m
          - package: ./internal/gedcom
            fuzz: FuzzImport
            time: 2m
          - package: ./internal/media
            fuzz: FuzzGenerateThumbnail
            time: 2m

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          release-assets.githubusercontent.com:443
          raw.githubusercontent.com:443
          *.actions.githubusercontent.com:443
          *.blob.core.windows.net:443
          proxy.golang.org:443
          sum.golang.org:443
          storage.googleapis.com:443
          dl.google.com:443

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'
        cache: true

    - name: Create placeholder for embedded files
      run: |
        mkdir -p internal/web/dist
        echo "placeholder" > internal/web/dist/.gitkeep

    - name: Run ${{ matrix.fuzz }}
      run: go test ${{ matrix.package }} -fuzz=${{ matrix.fuzz }} -fuzztime=${{ matrix.time }}

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-corpus-${{ matrix.fuzz }}
        path: '**/testdata/fuzz/**'
        retention-days: 30

  security:
    name: Security Scan (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          release-assets.githubusercontent.com:443
          raw.githubusercontent.com:443
          *.actions.githubusercontent.com:443
          *.blob.core.windows.net:443
          proxy.golang.org:443
          sum.golang.org:443
          storage.googleapis.com:443
          dl.google.com:443
          registry.npmjs.org:443
          nodejs.org:443
          vuln.go.dev:443
          auth.docker.io:443
          index.docker.io:443
          registry-1.docker.io:443
          production.cloudflare.docker.com:443
          production.cloudfront.docker.com:443
          docker-images-prod.6aa30f8b08e16409b46e0173d6de2f56.r2.cloudflarestorage.com:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443
          mirror.gcr.io:443

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Create placeholder for embedded files
      run: |
        mkdir -p internal/web/dist
        echo "placeholder" > internal/web/dist/.gitkeep

    - name: Install frontend dependencies
      run: cd web && npm ci --ignore-scripts && npm run prepare

    - name: Run govulncheck
      uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
      with:
        go-version-file: go.mod
        repo-checkout: false
        output-format: sarif
        output-file: govulncheck-results.sarif

    - name: Upload govulncheck results
      uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      if: success() || failure()
      with:
        sarif_file: govulncheck-results.sarif
        category: govulncheck-nightly

    - name: Run gosec
      uses: securego/gosec@849570622f56a251c015c0e2417aebafc0216e17 # master (docker: 2.25.0)
      with:
        args: '-no-fail -exclude=G104 -exclude-generated -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      if: success() || failure()
      with:
        sarif_file: gosec-results.sarif
        category: gosec-nightly

    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
      continue-on-error: true # Findings go to SARIF/Security tab; don't fail the job
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      if: (success() || failure()) && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: trivy-results.sarif
        category: trivy-nightly

    - name: npm audit
      run: cd web && npm audit --audit-level=moderate

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [fuzz, security]
    if: failure() && github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          release-assets.githubusercontent.com:443
          raw.githubusercontent.com:443
          *.actions.githubusercontent.com:443
          *.blob.core.windows.net:443

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

    - name: Create issue on failure
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Check if an open nightly failure issue already exists
        EXISTING=$(gh issue list --label "nightly-failure" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING" ]; then
          gh issue comment "$EXISTING" --body "Nightly workflow failed again on $(date -u +%Y-%m-%d).

        [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          echo "Commented on existing issue #$EXISTING"
          exit 0
        fi

        gh issue create \
          --title "Nightly workflow failure ($(date -u +%Y-%m-%d))" \
          --label "nightly-failure" \
          --body "The nightly workflow failed on $(date -u +%Y-%m-%d).

        **Fuzz testing**: ${{ needs.fuzz.result }}
        **Security scan**: ${{ needs.security.result }}

        [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

        ---
        This issue was created automatically. Close it once the failure is resolved."
