name: Auto Rebase PRs

on:
  push:
    branches: [main]

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Rebase open PRs
        uses: peter-evans/rebase@e4945786f7ca41fe6e101cead4395f5489593943 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          exclude: dependabot/**
