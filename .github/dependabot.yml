version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    cooldown:
      default-days: 5
      include:
        - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    cooldown:
      default-days: 5
      include:
        - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  # npm (Svelte frontend)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    cooldown:
      default-days: 5
      include:
        - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      # TypeScript 7 (native-compiler major) is blocked by SvelteKit's peer cap
      # (@sveltejs/kit caps typescript at ^6.0.0). Tracked in #655 — remove this
      # ignore when adopting TS 7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Docker base images in Dockerfile (SHA-pinned; Dependabot keeps digests fresh)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    cooldown:
      default-days: 5
      include:
        - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
